<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>

<body style="text-align: center; align-content: center">

    <div class="loading-column">
        <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 50 50" role="presentation">
            <circle cx="25" cy="25" r="20" stroke="#ccc" stroke-width="4" fill="none"/>
            <circle cx="25" cy="25" r="20" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"
                    stroke-dasharray="90 125">
                <animateTransform attributeName="transform" type="rotate" from="0 25 25" to="360 25 25" dur="1s"
                                  repeatCount="indefinite"/>
            </circle>
        </svg>

        <div class="loading-text">
            Loading Portfolio<span class="dots"></span><br>
            Note Only first time might take some time to load<br>
            Subsequent times will be almost instantaneous Inshallah
        </div>

        <script type="application/javascript" src="composeApp.js"></script>
    </div>

</body>

</html>
